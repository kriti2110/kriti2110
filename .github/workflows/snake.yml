name: Green Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate custom snake SVG
        run: |
          python3 << 'PYEOF'
          import os, random

          COLS, ROWS = 53, 7
          CELL, GAP, PAD = 11, 3, 10
          BG   = "#0d1117"
          # GitHub contribution graph shades: black → super light → light → medium → dark green
          SHADES  = ["#0d1117", "#0e4429", "#006d32", "#26a641", "#39d353"]
          WEIGHTS = [0.12,      0.22,      0.28,      0.23,      0.15]
          BODY    = "#ffffff"   # white snake
          DARK    = "#0d1117"   # eaten cell goes black
          DUR     = 24
          BODY_LEN = 7

          W = COLS * (CELL + GAP) - GAP + PAD * 2
          H = ROWS * (CELL + GAP) - GAP + PAD * 2

          def cx(c): return PAD + c * (CELL + GAP)
          def cy(r): return PAD + r * (CELL + GAP)

          # Horizontal path: left→right across each row, top to bottom
          path = [(c, r) for r in range(ROWS) for c in range(COLS)]
          N = len(path)  # 371 cells

          # Assign each cell a random green shade (seeded for consistency)
          random.seed(42)
          cell_color = {(c, r): random.choices(SHADES, weights=WEIGHTS)[0]
                        for r in range(ROWS) for c in range(COLS)}

          parts = [
              f'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {W} {H}">',
              f'<rect width="100%" height="100%" fill="{BG}"/>',
          ]

          for i, (c, r) in enumerate(path):
              t_eat   = i / N
              t_tail  = min((i + BODY_LEN) / N, 0.99998)
              t_reset = 0.99999
              initial = cell_color[(c, r)]

              # initial shade → white (snake over it) → black (eaten) → initial (loop reset)
              vals   = f"{initial};{BODY};{DARK};{initial}"
              ktimes = f"0;{t_eat:.5f};{t_tail:.5f};{t_reset}"

              parts.append(
                  f'<rect x="{cx(c)}" y="{cy(r)}" width="{CELL}" height="{CELL}" rx="2">'
                  f'<animate attributeName="fill" values="{vals}" keyTimes="{ktimes}"'
                  f' dur="{DUR}s" repeatCount="indefinite" calcMode="discrete"/>'
                  f'</rect>'
              )

          # White snake head moving horizontally across rows
          xs  = ";".join(str(cx(c) + CELL // 2) for c, r in path) + f";{cx(path[0][0]) + CELL // 2}"
          ys  = ";".join(str(cy(r) + CELL // 2) for c, r in path) + f";{cy(path[0][1]) + CELL // 2}"
          kts = ";".join(f"{i / N:.5f}" for i in range(N)) + ";1.0"

          parts.append(
              f'<circle r="{CELL // 2 + 2}" fill="#ffffff" stroke="{BG}" stroke-width="2">'
              f'<animate attributeName="cx" values="{xs}" keyTimes="{kts}" dur="{DUR}s" repeatCount="indefinite"/>'
              f'<animate attributeName="cy" values="{ys}" keyTimes="{kts}" dur="{DUR}s" repeatCount="indefinite"/>'
              f'</circle>'
          )

          parts.append('</svg>')

          os.makedirs('dist', exist_ok=True)
          with open('dist/snake-green.svg', 'w') as f:
              f.write(''.join(parts))

          print(f"Done: {W}x{H}px, {N} cells, {DUR}s loop")
          PYEOF

      - name: Push SVG to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

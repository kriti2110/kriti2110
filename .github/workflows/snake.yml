name: Green Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate all-green custom snake SVG
        run: |
          python3 << 'PYEOF'
          import os

          COLS, ROWS = 53, 7
          CELL, GAP, PAD = 11, 3, 10
          BG    = "#0d1117"
          GREEN = "#39d353"
          BODY  = "#ffffff"
          DARK  = "#0d1117"
          DUR   = 22

          W = COLS * (CELL + GAP) - GAP + PAD * 2
          H = ROWS * (CELL + GAP) - GAP + PAD * 2

          def cx(c): return PAD + c * (CELL + GAP)
          def cy(r): return PAD + r * (CELL + GAP)

          # Zigzag path covers every single cell
          path = [
              (c, r)
              for c in range(COLS)
              for r in (range(ROWS) if c % 2 == 0 else range(ROWS - 1, -1, -1))
          ]
          N = len(path)  # 371 cells
          BODY_LEN = 7   # snake body length in cells

          parts = [
              f'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {W} {H}">',
              f'<rect width="100%" height="100%" fill="{BG}"/>',
          ]

          for i, (c, r) in enumerate(path):
              t_eat  = i / N
              t_tail = min((i + BODY_LEN) / N, 0.99998)
              t_reset = 0.99999

              # green → white (snake passes over) → black (eaten) → green (loop reset)
              vals   = f"{GREEN};{BODY};{DARK};{GREEN}"
              ktimes = f"0;{t_eat:.5f};{t_tail:.5f};{t_reset}"

              parts.append(
                  f'<rect x="{cx(c)}" y="{cy(r)}" width="{CELL}" height="{CELL}" rx="2">'
                  f'<animate attributeName="fill" values="{vals}" keyTimes="{ktimes}"'
                  f' dur="{DUR}s" repeatCount="indefinite" calcMode="discrete"/>'
                  f'</rect>'
              )

          # Animated snake head (white circle moves along the path)
          xs  = ";".join(str(cx(c) + CELL // 2) for c, r in path) + f";{cx(path[0][0]) + CELL // 2}"
          ys  = ";".join(str(cy(r) + CELL // 2) for c, r in path) + f";{cy(path[0][1]) + CELL // 2}"
          kts = ";".join(f"{i / N:.5f}" for i in range(N)) + ";1.0"

          parts.append(
              f'<circle r="{CELL // 2 + 2}" fill="#ffffff" stroke="{BG}" stroke-width="2">'
              f'<animate attributeName="cx" values="{xs}" keyTimes="{kts}" dur="{DUR}s" repeatCount="indefinite"/>'
              f'<animate attributeName="cy" values="{ys}" keyTimes="{kts}" dur="{DUR}s" repeatCount="indefinite"/>'
              f'</circle>'
          )

          parts.append('</svg>')

          os.makedirs('dist', exist_ok=True)
          with open('dist/snake-green.svg', 'w') as f:
              f.write(''.join(parts))

          print(f"Done: {W}x{H}px, {N} cells, {DUR}s loop")
          PYEOF

      - name: Push SVG to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
